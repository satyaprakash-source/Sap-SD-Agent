<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Thumbnails Maker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; }
        .font-display { font-family: 'Space Grotesk', sans-serif; }
        .glow-text { text-shadow: 0 0 20px rgba(255, 99, 33, 0.5); }
        .brutal-border { border: 2px solid white; box-shadow: 4px 4px 0px white; transition: all 0.1s; }
        .brutal-border:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px white; }
        .thumbnail-container { aspect-ratio: 16 / 9; width: 100%; max-width: 1280px; }
        
        /* Tailwind Custom Colors */
        .bg-brand-orange { background-color: #FF6321; }
        .text-brand-orange { color: #FF6321; }
        .border-brand-orange { border-color: #FF6321; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Import Map for ESM Modules -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19",
        "react-dom/client": "https://esm.sh/react-dom@19/client",
        "lucide-react": "https://esm.sh/lucide-react",
        "motion/react": "https://esm.sh/motion/react",
        "@google/genai": "https://esm.sh/@google/genai"
      }
    }
    </script>

    <script type="module">
        import React, { useState, useRef } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Upload, Type, Sparkles, Download, RefreshCw, 
            Image as ImageIcon, AlertCircle, CheckCircle2, Loader2 
        } from 'lucide-react';
        import { motion, AnimatePresence } from 'motion/react';
        import { GoogleGenAI } from '@google/genai';

        function App() {
            const [title, setTitle] = useState('');
            const [image, setImage] = useState(null);
            const [isGenerating, setIsGenerating] = useState(false);
            const [generatedThumbnail, setGeneratedThumbnail] = useState(null);
            const [error, setError] = useState(null);
            const fileInputRef = useRef(null);

            // Note: Replace with your actual key or use process.env if available
            const apiKey = "YOUR_GEMINI_API_KEY"; 
            const ai = new GoogleGenAI({ apiKey });

            const handleImageUpload = (e) => {
                const file = e.target.files?.[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setImage(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const generateThumbnail = async () => {
                if (!title || !image) {
                    setError('Please provide both a title and a headshot photo.');
                    return;
                }
                setIsGenerating(true);
                setError(null);

                try {
                    const base64Data = image.split(',')[1];
                    const mimeType = image.split(';')[0].split(':')[1];
                    const prompt = `Create a professional YouTube thumbnail (1280x720). Title: "${title}". Style: High contrast, vibrant, cinematic.`;

                    const response = await ai.models.generateContent({
                        model: 'gemini-2.5-flash-image',
                        contents: { parts: [{ inlineData: { data: base64Data, mimeType } }, { text: prompt }] },
                        config: { imageConfig: { aspectRatio: "16:9" } }
                    });

                    const imgPart = response.candidates?.[0]?.content?.parts.find(p => p.inlineData);
                    if (imgPart) {
                        setGeneratedThumbnail(`data:image/png;base64,${imgPart.inlineData.data}`);
                    } else {
                        throw new Error('No image generated.');
                    }
                } catch (err) {
                    setError(err.message);
                } finally {
                    setIsGenerating(false);
                }
            };

            return React.createElement('div', { className: "min-h-screen p-8 flex flex-col items-center" }, 
                // ... This is a simplified version of the UI ...
                React.createElement('h1', { className: "text-4xl font-display font-black italic glow-text mb-8" }, "AI THUMBNAILS MAKER"),
                React.createElement('div', { className: "w-full max-w-md space-y-4" }, 
                    React.createElement('textarea', { 
                        className: "w-full bg-zinc-900 p-4 rounded-xl border-2 border-zinc-800",
                        placeholder: "Video Title...",
                        value: title,
                        onChange: (e) => setTitle(e.target.value)
                    }),
                    React.createElement('button', { 
                        onClick: generateThumbnail,
                        className: "w-full py-4 bg-brand-orange rounded-xl font-bold brutal-border"
                    }, isGenerating ? "GENERATING..." : "GENERATE THUMBNAIL")
                )
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
